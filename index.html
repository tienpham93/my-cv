
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tien Pham Minh | Professional CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .font-serif {
            font-family: 'Playfair+Display', serif;
        }
        .pdf-capture {
            overflow: visible !important;
        }
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            @page {
                size: A4 portrait;
                margin: 0.5cm;
            }
            body {
                background-color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
            #root, main {
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                width: 100% !important;
            }
            .cv-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                border: none !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }
        }
        /* Fix for html2pdf capture */
        .pdf-capture {
            width: 1024px !important;
            margin: 0 !important;
            padding: 0 !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
            background: white !important;
            height: auto !important;
            overflow: visible !important;
            transform: none !important;
        }
        .pdf-capture * {
            print-color-adjust: exact !important;
            -webkit-print-color-adjust: exact !important;
            box-shadow: none !important;
            text-rendering: auto !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            letter-spacing: normal !important;
            box-sizing: border-box !important;
        }
        .pdf-capture .cv-container {
            width: 1024px !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
            padding-right: 40px !important; /* Safety padding to prevent right-side clipping */
            overflow: visible !important;
        }
        .pdf-capture li, 
        .pdf-capture .group {
            page-break-inside: avoid !important;
            break-inside: avoid !important;
        }
        .force-page-break {
            page-break-before: always !important;
            break-before: page !important;
        }
        .pdf-capture #cv-avatar,
        .pdf-capture #cv-avatar-fallback {
            width: 80px !important;
            height: 80px !important;
            min-width: 80px !important;
            min-height: 80px !important;
            border-radius: 50% !important;
            display: block !important;
            flex-shrink: 0 !important;
        }
        .pdf-capture #cv-avatar-fallback {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background-color: #1e293b !important;
            color: #3b82f6 !important;
            font-size: 24px !important;
            font-weight: bold !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",

    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
